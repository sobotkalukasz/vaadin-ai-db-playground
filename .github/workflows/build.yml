name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - initial-vaadin-project

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run tests
        run: mvn --batch-mode test
