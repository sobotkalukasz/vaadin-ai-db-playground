name: Build
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -B clean verify
      - run: ./mvnw -B -Pproduction clean package -DskipTests
